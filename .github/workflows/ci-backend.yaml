name: ci-backend
on:
 push:
   branches: [ci-cd , main]
   paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'


 pull_request:
   branches: [ci-cd , main]
   paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
 unit-tests:
   name: ci-backend1
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
    
     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '18'
    
     - name: Install dependencies
       working-directory: ./backend
       run: npm install
    
     - name: Run unit tests
       working-directory: ./backend
       run: npm test
    
  
     - name: Test summary
       run: echo "Unit Test secceded"
