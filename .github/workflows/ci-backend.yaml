name: ci-backend

on:
  push:
    branches: [main, ci/cd]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yaml'

  pull_request:
    branches: [main, ci/cd]
    paths:
      - 'backend/**'

jobs:

# =========================
# 1. UNIT TESTS
# =========================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run unit tests
        working-directory: ./backend
        run: npm test

      - name: Test summary
        run: echo "✅ Unit tests passed"
