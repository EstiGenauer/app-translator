name: CI Frontend

on:
  push:
    branches: [main, ci-cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-cd-frontend.yaml'
  pull_request:
    branches: [main, ci-cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-cd-frontend.yaml'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify files
        run: |
          ls -la frontend/
          echo "Frontend files verified"

  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "*.test.js" \
            --exclude "Dockerfile" \
            --exclude ".dockerignore" \
            --exclude "nginx*.conf"
          echo "Deployed to S3"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "CloudFront cache cleared"
