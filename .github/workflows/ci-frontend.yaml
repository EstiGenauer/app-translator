name: ci-frontend
 
"on":
  push:
    branches: [main, ci-cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
  pull_request:
    branches: [main, ci-cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
 
permissions:
  id-token: write
  contents: write
 
jobs:
 
# =========================
# 1. BUILD & VERIFY
# =========================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Verify frontend files
        run: |
          ls -la frontend/
          echo "✅ Frontend files verified"
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: app-translator-frontend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
      - name: Test Docker image
        run: |
          docker run --rm -d -p 8080:80 --name frontend-test app-translator-frontend:${{ github.sha }}
          sleep 2
          curl -f http://localhost:8080 || exit 1
          docker stop frontend-test
          echo "✅ Frontend image works!"
 
# =========================
# 2. PUSH TO DOCKERHUB
# =========================
  push:
    name: Push to DockerHub
    runs-on: ubuntu-latest
    needs: build
 
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUBTOKEN }}
 
      - name: Build and push (reusing cache)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
# =========================
# 3. TERRAFORM
# =========================
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: push
 
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd')
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
 
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
 
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan
 
      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
