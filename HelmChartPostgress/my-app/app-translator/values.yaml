backend:
  image: estigenauer/app-backend:latest
  replicas: 2
  port: 3001

frontend:
  image: estigenauer/app-frontend:latest
  replicas: 2
  port: 80

translator:
  image: libretranslate/libretranslate:latest
  replicas: 1
  port: 5000
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"

ingress:
  enabled: true
  host: translator.local