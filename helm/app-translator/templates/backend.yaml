apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        ports:
        - containerPort: {{ .Values.backend.port }}

        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
          

        env:
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres-service:5432/translations"
        - name: TRANSLATOR_HOST
          value: "translator-service"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
  type: ClusterIP
  
